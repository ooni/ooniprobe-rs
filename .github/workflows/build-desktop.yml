name: Build Desktop JARs

on:
  push:
    branches: [ feat/ooniprobe-ffi-kotlin ]

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            make-target: desktop-linux
            artifact_name: ooniprobe-desktop-linux.jar

          - os: macos-latest
            make-target: desktop-macos
            artifact_name: ooniprobe-desktop-macos.jar

          - os: windows-latest
            make-target: desktop-windows
            artifact_name: ooniprobe-desktop-windows.jar

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust toolchain
        run: rustup update stable

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Desktop JAR
        shell: bash
        run: |
          make ${{ matrix.make_target }}

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.jar_name }}
          path: desktop/build/libs/${{ matrix.jar_name }}
