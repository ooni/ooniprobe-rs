name: Build Static Library Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feat/capi
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - run: rustup update stable

      - name: Install cross-compilation toolchain
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cmake ninja-build

      - name: Configure cross-compilation
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << EOF
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build x86_64
        run: |
          make linux/x86_64

      - name: Build aarch64
        run: |
          make linux/aarch64
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CC: aarch64-linux-gnu-gcc
          CXX: aarch64-linux-gnu-g+u+
      
      - name: Build linux bundle
        run: make staticlib-linux

      - name: Upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-linux
          path: target/lib

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - run: rustup update stable

      - name: Build macOS bundle
        run: make staticlib-macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-macos
          path: target/lib

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - run: rustup update stable

      - name: Install MinGW
        run: choco install mingw --no-progress

      - name: Build windows bundle
        shell: bash
        run: make staticlib-windows

      - name: Upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib-windows
          path: target/lib

  bundle:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lib-*
          merge-multiple: true
          path: target/lib

      - name: Create static library bundle
        run: tar -czf target/staticlib.tar.gz -C target lib

      - name: Upload combined bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ooniprobe-ffi-staticlib
          path: target/staticlib.tar.gz

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" target/staticlib.tar.gz --clobber
