name: OONI probe userauth builds

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build-ffi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: libooniprobe_userauth.a
            out_name: libooniprobe_userauth-linux-amd64.a

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: libooniprobe_userauth.a
            out_name: libooniprobe_userauth-linux-arm64.a

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: libooniprobe_userauth.a
            out_name: libooniprobe_userauth-darwin-amd64.a

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ooniprobe_userauth.lib
            out_name: ooniprobe_userauth-windows-amd64.lib

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build -p ooniprobe-userauth --release --target ${{ matrix.target }}

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} artifacts/${{ matrix.out_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.out_name }}
          path: artifacts/${{ matrix.out_name }}

  generate-header:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate header
        run: cbindgen --crate ooniprobe-userauth --output ooniprobe_userauth.h --lang c

      - name: Upload header
        uses: actions/upload-artifact@v6
        with:
          name: ooniprobe_userauth.h
          path: ooniprobe_userauth.h
