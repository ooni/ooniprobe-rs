name: Build & Attach FFI Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-ffi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: libooniprobe_userauth.a
            out: libooniprobe_userauth-linux-amd64.a

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: libooniprobe_userauth.a
            out: libooniprobe_userauth-linux-arm64.a

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: libooniprobe_userauth.a
            out: libooniprobe_userauth-darwin-amd64.a

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: ooniprobe_userauth.lib
            out: ooniprobe_userauth-windows-amd64.lib

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build -p ooniprobe-userauth --release --target ${{ matrix.target }}

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.out }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.out }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-header:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate header
        run: cbindgen --crate ooniprobe-userauth --output ooniprobe_userauth.h --lang c

      - name: Upload header to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ooniprobe_userauth.h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
