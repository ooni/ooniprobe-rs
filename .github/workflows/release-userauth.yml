name: Build & Attach FFI Artifacts

on:
  release:
    types: [published]

jobs:
  build-ffi:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            out: libooniprobe_userauth-linux-amd64.a

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            out: libooniprobe_userauth-linux-arm64.a

          - os: macos-latest
            target: x86_64-apple-darwin
            out: libooniprobe_userauth-darwin-amd64.a

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            out: ooniprobe_userauth-windows-amd64.lib

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          override: true

      - name: Install Linux ARM64 toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build -p ooniprobe-userauth --release --target ${{ matrix.target }}

      - name: Collect artifact
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.target }}" == "x86_64-pc-windows-msvc" ]]; then
            cp target/${{ matrix.target }}/release/ooniprobe_userauth.lib dist/${{ matrix.out }}
          else
            cp target/${{ matrix.target }}/release/libooniprobe_userauth.a dist/${{ matrix.out }}
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/${{ matrix.out }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-header:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate header
        run: cbindgen --crate ooniprobe-userauth --output ooniprobe_userauth.h --lang c

      - name: Upload header to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ooniprobe_userauth.h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
