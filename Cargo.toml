[package]
name = "ooniprobe-rs"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
reqwest = { version = "0.12.9", features = ["json"] }
serde = "1.0.216"
serde_json = "1.0.133"
serde_derive = "1.0"

tokio = { version = "1.42.0", features = ["macros"] }
url = "2.5.4"
bytes = "1.9.0"
http-body-util = "0.1.2"
http = "1.2.0"
hyper-util = { version = "0.1.10", features = ["http1", "http2"] }
hyper = "1.5.2"
boring = { git = "https://github.com/hellais/boring", branch = "parrot", features = [
    "pq-experimental",
] }
tokio-boring = { git = "https://github.com/hellais/boring", branch = "parrot", features = [
    "pq-experimental",
] }
brotli = "7.0.0"
