[workspace]
members = ["ooniprobe-core", "ooniprobe-services", "ooniprobe-experiments"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
ooniprobe-core = { version = "0.1.0", path = "./ooniprobe-core" }
ooniprobe-experiments = { version = "0.1.0", path = "./ooniprobe-experiments" }
ooniprobe-services = { version = "0.1.0", path = "./ooniprobe-services" }

serde = { version = "1.0.216", features = ["serde_derive"] }
serde_json = "1.0.133"
serde_derive = "1.0"

tokio = { version = "1.42.0", features = ["full"] }
url = "2.5.4"
bytes = "1.9.0"
http-body-util = "0.1.2"
http = "1.2.0"
pin-project = "1"
#mio = { version = "1.42.0" }
hyper-util = { version = "0.1.10", features = ["http1", "http2", "tokio"] }
hyper = { version = "1.5.2", features = ["client"] }
boring = { git = "https://github.com/hellais/boring", branch = "parrot", features = [
    "pq-experimental",
] }
tokio-boring = { git = "https://github.com/hellais/boring", branch = "parrot", features = [
    "pq-experimental",
] }
brotli = { version = "6.0.0", features = ["std"] }
quanta = "0.12.4"
